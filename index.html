<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Namaz Vakitleri</title>

<style>
body {
  margin:0;
  background:#0b4f63;
  color:white;
  font-family:"Segoe UI", Arial, sans-serif;
  text-align:center;
  padding:25px 20px 40px 20px;
}

h1 {
  font-size:46px;
  margin-bottom:15px;
}

#clock {
  font-size:62px;
  color:#ffd700;
  margin-bottom:8px;
}

#countdown {
  font-size:30px;
  color:#ff3b3b;
  font-weight:bold;
  margin-bottom:20px;
}

.line {
  width:75%;
  height:2px;
  background:#ffd700;
  margin:18px auto;
  opacity:0.7;
}

#gregorianDate,
#hijriDate {
  font-size:26px;
  font-weight:bold;
  color:#ffd700;
}

#hijriDate {
  margin-bottom:15px;
}

.vakit {
  font-size:36px;
  margin:14px 0;
}

#hadithBox {
  margin-top:35px;
  padding:18px;
  font-size:22px;
  font-style:italic;
  line-height:1.6;
  background:rgba(255,255,255,0.08);
  border-left:5px solid #ffd700;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>Innsbruck</h1>

<div id="clock"></div>
<div id="countdown"></div>

<div class="line"></div>

<div id="gregorianDate"></div>
<div id="hijriDate"></div>

<div class="line"></div>

<div id="vakitler">Lade Gebetszeiten...</div>

<div id="hadithBox"></div>

<script>

let maghribTime = null;

// Uhr
function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString("de-AT");
}
setInterval(updateClock,1000);
updateClock();

// Zeitkorrektur
function adjust(time, minutes){
  if (!time) return "--:--";
  const parts = time.split(":");
  const d = new Date();
  d.setHours(parseInt(parts[0]));
  d.setMinutes(parseInt(parts[1]) + minutes);
  return d.toTimeString().slice(0,5);
}

// Countdown
function updateCountdown() {
  if (!maghribTime) return;

  const now = new Date();
  const diff = maghribTime - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerText = "Maghrib vakti!";
    return;
  }

  const hours = Math.floor(diff / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  const seconds = Math.floor((diff % 60000) / 1000);

  document.getElementById("countdown").innerText =
    "Maghrib'e kalan: " +
    String(hours).padStart(2,'0') + ":" +
    String(minutes).padStart(2,'0') + ":" +
    String(seconds).padStart(2,'0');
}
setInterval(updateCountdown,1000);

// Türkische Monate
const gregorianMonthsTR = {
  January:"Ocak", February:"Şubat", March:"Mart",
  April:"Nisan", May:"Mayıs", June:"Haziran",
  July:"Temmuz", August:"Ağustos", September:"Eylül",
  October:"Ekim", November:"Kasım", December:"Aralık"
};

// API laden (stabil abgesichert)
fetch("https://api.aladhan.com/v1/timingsByCity?city=Innsbruck&country=Austria&method=13")
.then(response => {
  if (!response.ok) throw new Error("HTTP Fehler");
  return response.json();
})
.then(data => {

  if (!data || !data.data || !data.data.timings) {
    throw new Error("Ungültige API Antwort");
  }

  const timings = data.data.timings;

  // Gregorian Datum
  const greg = data.data.date.gregorian;
  const gregMonthName = greg.month?.en || greg.month?.name || "";
  const gregMonth = gregorianMonthsTR[gregMonthName] || gregMonthName;

  document.getElementById("gregorianDate").innerText =
    `${greg.day} ${gregMonth} ${greg.year}`;

  // Hijri Datum
  const hijri = data.data.date.hijri;
  document.getElementById("hijriDate").innerText =
    `${hijri.day} ${hijri.month.en} ${hijri.year} AH`;

  // Maghrib Countdown
  const maghribAdjusted = adjust(timings.Maghrib, -1);
  const parts = maghribAdjusted.split(":");

  maghribTime = new Date();
  maghribTime.setHours(parseInt(parts[0]));
  maghribTime.setMinutes(parseInt(parts[1]));
  maghribTime.setSeconds(0);

  // Gebetszeiten
  document.getElementById("vakitler").innerHTML = `
    <div class="vakit">İmsak: ${adjust(timings.Fajr,1)}</div>
    <div class="vakit">Güneş: ${timings.Sunrise}</div>
    <div class="vakit">Öğle: ${timings.Dhuhr}</div>
    <div class="vakit">İkindi: ${adjust(timings.Asr,1)}</div>
    <div class="vakit">Akşam: ${maghribAdjusted}</div>
    <div class="vakit">Yatsı: ${adjust(timings.Isha,-7)}</div>
  `;

})
.catch(error => {
  document.getElementById("vakitler").innerText = "Gebetszeiten konnten nicht geladen werden";
  console.error(error);
});

// 50 Hadithe
const hadithler = [
"Kolaylaştırınız, zorlaştırmayınız.",
"İnsanların en hayırlısı insanlara faydalı olandır.",
"Ameller niyetlere göredir.",
"Gülümsemen sadakadır.",
"Sabır imanın yarısıdır.",
"Temizlik imandandır.",
"Komşusu açken tok yatan bizden değildir.",
"Merhamet etmeyene merhamet edilmez.",
"İlim öğrenmek her Müslümana farzdır.",
"Doğruluk iyiliğe götürür.",
"Allah güzeldir, güzelliği sever.",
"İki nimet vardır: Sağlık ve boş vakit.",
"En güçlü kimse öfkesini yenendir.",
"Sadaka belayı def eder.",
"Anne babaya iyilik cennetin kapısıdır.",
"Kim affederse Allah da onu affeder.",
"Hayâ imandandır.",
"Dua ibadetin özüdür.",
"Az da olsa devamlı amel hayırlıdır.",
"Allah sabredenlerle beraberdir.",
"Yoldan eziyet veren şeyi kaldırmak sadakadır.",
"Veren el alan elden hayırlıdır.",
"Selamı yayınız.",
"Bir mümini sevindirmek sadakadır.",
"Allah kalplere bakar.",
"Hayır söyle ya da sus.",
"Zenginlik gönül zenginliğidir.",
"Sabreden zafere ulaşır.",
"Allah kuluna şah damarından daha yakındır.",
"İstişare eden pişman olmaz.",
"Helal bellidir, haram bellidir.",
"İyilik güzel ahlaktır.",
"Doğru sözlü olunuz.",
"Allah’a tevekkül eden kimseye Allah yeter.",
"En hayırlı azık takvadır.",
"Allah yumuşaktır, yumuşaklığı sever.",
"Kim tevazu gösterirse Allah onu yükseltir.",
"Kalpler Allah’ı anmakla huzur bulur.",
"Bir mümin diğer mümine duvar gibidir.",
"Merhamet etmeyene merhamet edilmez.",
"Temizlik imandandır.",
"Sabır acıdır, meyvesi tatlıdır.",
"İlim en büyük hazinedir.",
"Allah kuluna merhametlidir.",
"İyilik eden iyilik bulur.",
"Affetmek büyüklüktür.",
"Allah sabredenleri sever.",
"Kötülüğü iyilikle sav.",
"Allah doğruları sever.",
"Dünya geçicidir, ahiret kalıcıdır."
];

const today = new Date();
const index = today.getDate() % hadithler.length;
document.getElementById("hadithBox").innerText = hadithler[index];

</script>

</body>
</html>
