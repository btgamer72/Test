<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Namaz Vakitleri</title>
<style>
body {
  margin:0;
  background:#004e6b;
  color:white;
  font-family:Arial;
  text-align:center;
  padding-top:20px;
}
h1 { font-size:60px; }
.vakit { font-size:45px; margin:30px; }
#clock { font-size:70px; margin-bottom:10px; color:gold; }
#countdown { font-size:45px; margin-bottom:15px; color:#ff3b3b; font-weight:bold; }
#gregorianDate { font-size:28px; }
#hijriDate { font-size:30px; margin-bottom:30px; }
</style>
</head>
<body>

<h1>Innsbruck</h1>
<div id="clock"></div>
<div id="countdown"></div>
<div id="gregorianDate"></div>
<div id="hijriDate"></div>
<div id="vakitler">Lade Gebetszeiten...</div>

<script>

let maghribTime = null;

// Uhr
function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString("de-AT");
}
setInterval(updateClock,1000);
updateClock();

// Minuten-Anpassung
function adjust(time, minutes){
  const [h,m] = time.split(":").map(Number);
  const d = new Date();
  d.setHours(h);
  d.setMinutes(m + minutes);
  return d.toTimeString().slice(0,5);
}

// Countdown
function updateCountdown() {
  if (!maghribTime) return;

  const now = new Date();
  const diff = maghribTime - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerText = "Maghrib time!";
    return;
  }

  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("countdown").innerText =
    "Time until Maghrib: " +
    String(hours).padStart(2, '0') + ":" +
    String(minutes).padStart(2, '0') + ":" +
    String(seconds).padStart(2, '0');
}
setInterval(updateCountdown, 1000);

// Arabische Monatsnamen (Transliteration)
const hijriMonthsArabicLatin = {
  "Muharram": "Muharram",
  "Safar": "Safar",
  "Rabi' al-awwal": "Rabi al-Awwal",
  "Rabi' al-thani": "Rabi al-Thani",
  "Jumada al-awwal": "Jumada al-Ula",
  "Jumada al-thani": "Jumada al-Akhirah",
  "Rajab": "Rajab",
  "Sha'ban": "Sha'ban",
  "Ramadan": "Ramadan",
  "Shawwal": "Shawwal",
  "Dhu al-Qi'dah": "Dhul Qa'dah",
  "Dhu al-Hijjah": "Dhul Hijjah"
};

// Gebetszeiten laden
fetch("https://api.aladhan.com/v1/timingsByCity?city=Innsbruck&country=Austria&method=13")
.then(response => response.json())
.then(data => {

    if(!data || !data.data){
        document.getElementById("vakitler").innerText = "API Error";
        return;
    }

    const t = data.data.timings;

    // Gregorianisches Datum
    const greg = data.data.date.gregorian;
    document.getElementById("gregorianDate").innerText =
      greg.day + " " + greg.month.en + " " + greg.year;

    // Hijri Datum mit arabischer Transliteration
    const hijri = data.data.date.hijri;
    const hijriMonthLatin = hijriMonthsArabicLatin[hijri.month.en] || hijri.month.en;

    document.getElementById("hijriDate").innerText =
      hijri.day + " " + hijriMonthLatin + " " + hijri.year + " AH";

    // Maghrib Countdown
    const maghribAdjusted = adjust(t.Maghrib, -1);
    const [h, m] = maghribAdjusted.split(":").map(Number);

    maghribTime = new Date();
    maghribTime.setHours(h);
    maghribTime.setMinutes(m);
    maghribTime.setSeconds(0);

    document.getElementById("vakitler").innerHTML = `
      <div class="vakit">Fajr: ${adjust(t.Fajr, 1)}</div>
      <div class="vakit">Sunrise: ${t.Sunrise}</div>
      <div class="vakit">Dhuhr: ${t.Dhuhr}</div>
      <div class="vakit">Asr: ${adjust(t.Asr, 1)}</div>
      <div class="vakit">Maghrib: ${maghribAdjusted}</div>
      <div class="vakit">Isha: ${adjust(t.Isha, -7)}</div>
    `;
})
.catch(error => {
    document.getElementById("vakitler").innerText = "Error loading data";
    console.error(error);
});

</script>

</body>
</html>
