<script>
async function loadTimes(){
  try {
    const res = await fetch("https://api.aladhan.com/v1/timingsByCity?city=Innsbruck&country=Austria&method=13");
    const data = await res.json();
    const t = data.data.timings;

    document.getElementById("vakitler").innerHTML = `
      <div class="vakit">İmsak: ${t.Fajr}</div>
      <div class="vakit">Güneş: ${t.Sunrise}</div>
      <div class="vakit">Öğle: ${t.Dhuhr}</div>
      <div class="vakit">İkindi: ${t.Asr}</div>
      <div class="vakit">Akşam: ${t.Maghrib}</div>
      <div class="vakit">Yatsı: ${t.Isha}</div>
    `;
  } catch (err) {
    document.getElementById("vakitler").innerHTML = "Gebetszeiten konnten nicht geladen werden.";
    console.error(err);
  }
}

function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString("de-AT");
}

setInterval(updateClock,1000);
loadTimes();
</script>
