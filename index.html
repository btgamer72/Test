<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Namaz Vakitleri</title>

<style>
body {
  margin:0;
  background:#0b4f63;
  color:white;
  font-family:"Segoe UI", Arial, sans-serif;
  text-align:center;
  padding:30px 20px;
}

/* Titel */
h1 {
  font-size:48px;
  margin-bottom:15px;
  letter-spacing:1px;
}

/* Uhr */
#clock {
  font-size:60px;
  color:#ffd700;
  margin-bottom:5px;
}

/* Countdown */
#countdown {
  font-size:32px;
  color:#ff3b3b;
  font-weight:bold;
  margin-bottom:20px;
}

/* Goldene Linie */
.line {
  width:70%;
  height:2px;
  background:#ffd700;
  margin:15px auto;
  opacity:0.6;
}

/* Daten */
#gregorianDate,
#hijriDate {
  font-size:26px;
  font-weight:bold;
  color:#ffd700;
}

#hijriDate {
  margin-bottom:10px;
}

/* Gebetszeiten */
.vakit {
  font-size:34px;
  margin:10px 0;
}

</style>
</head>

<body>

<h1>Innsbruck</h1>

<div id="clock"></div>
<div id="countdown"></div>

<div class="line"></div>

<div id="gregorianDate"></div>
<div id="hijriDate"></div>

<div class="line"></div>

<div id="vakitler">Lade Gebetszeiten...</div>

<script>

let maghribTime = null;

function updateClock(){
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString("de-AT");
}
setInterval(updateClock,1000);
updateClock();

function adjust(time, minutes){
  const parts = time.split(":");
  const d = new Date();
  d.setHours(parseInt(parts[0]));
  d.setMinutes(parseInt(parts[1]) + minutes);
  return d.toTimeString().slice(0,5);
}

function updateCountdown() {
  if (!maghribTime) return;

  const now = new Date();
  const diff = maghribTime - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerText = "Maghrib time!";
    return;
  }

  const hours = Math.floor(diff / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  const seconds = Math.floor((diff % 60000) / 1000);

  document.getElementById("countdown").innerText =
    "Maghrib'e kalan: " +
    String(hours).padStart(2,'0') + ":" +
    String(minutes).padStart(2,'0') + ":" +
    String(seconds).padStart(2,'0');
}
setInterval(updateCountdown,1000);

const gregorianMonthsTR = {
  January:"Ocak", February:"Şubat", March:"Mart",
  April:"Nisan", May:"Mayıs", June:"Haziran",
  July:"Temmuz", August:"Ağustos", September:"Eylül",
  October:"Ekim", November:"Kasım", December:"Aralık"
};

fetch("https://api.aladhan.com/v1/timingsByCity?city=Innsbruck&country=Austria&method=13")
.then(res => res.json())
.then(data => {

  if (!data || !data.data) {
    document.getElementById("vakitler").innerText = "API Error";
    return;
  }

  const timings = data.data.timings;

  const greg = data.data.date.gregorian;
  const gregMonthName = greg.month.en || greg.month.name;
  const gregMonth = gregorianMonthsTR[gregMonthName] || gregMonthName;

  document.getElementById("gregorianDate").innerText =
    greg.day + " " + gregMonth + " " + greg.year;

  const hijri = data.data.date.hijri;
  document.getElementById("hijriDate").innerText =
    hijri.day + " " + hijri.month.en + " " + hijri.year + " AH";

  const maghribAdjusted = adjust(timings.Maghrib, -1);
  const parts = maghribAdjusted.split(":");

  maghribTime = new Date();
  maghribTime.setHours(parseInt(parts[0]));
  maghribTime.setMinutes(parseInt(parts[1]));
  maghribTime.setSeconds(0);

  document.getElementById("vakitler").innerHTML = `
    <div class="vakit">İmsak: ${adjust(timings.Fajr,1)}</div>
    <div class="vakit">Güneş: ${timings.Sunrise}</div>
    <div class="vakit">Öğle: ${timings.Dhuhr}</div>
    <div class="vakit">İkindi: ${adjust(timings.Asr,1)}</div>
    <div class="vakit">Akşam: ${magribAdjusted}</div>
    <div class="vakit">Yatsı: ${adjust(timings.Isha,-7)}</div>
  `;

})
.catch(err => {
  document.getElementById("vakitler").innerText = "Fehler beim Laden";
  console.error(err);
});

</script>

</body>
</html>
